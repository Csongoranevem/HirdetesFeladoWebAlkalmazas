<h3>Bejelentkezés</h3>

<!--Fő tároló-->
<div class="container">


<!--Input mezők-->
<p-inputgroup>
    <p-inputgroup-addon>
        <i class="pi pi-at"></i>
    </p-inputgroup-addon>
       <input id="email" pInputText [(ngModel)]="user.email" placeholder="Email-cím" />
</p-inputgroup>

<p-password [(ngModel)]="user.password" [feedback]="false" [toggleMask]="true" placeholder="Jelszó" fluid/>


<!--Bejelentkezés gomb-->
<p-button label="Bejelentkezés" (click)="login()"/>
</div>
